apiVersion: v1
kind: Namespace
metadata:
  name: roze-wechat
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wechat-api-config
  namespace: roze-wechat
data:
  config.yaml: |
    name: wechat-api

    rest:
      addr: 0.0.0.0:8080
      register: false
      middlewares:
        recover: true
        trace: true
        stat: true
        prometheus: true
        cors: true
        timeout: true

    governance:
      timeout_ms: 30000
      retry:
        max_attempts: 1
        backoff_ms: 100
        max_backoff_ms: 1000
      rate_limit:
        burst: 200
        refill_ms: 1000
      breaker:
        failure_threshold: 10
        reset_timeout_ms: 30000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wechat-api
  namespace: roze-wechat
  labels:
    app.kubernetes.io/name: wechat-api
    app.kubernetes.io/part-of: roze-wechat
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wechat-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wechat-api
        app.kubernetes.io/part-of: roze-wechat
    spec:
      containers:
        - name: wechat-api
          image: ghcr.io/roze-team/wechat-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: wechat-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: wechat-api
  namespace: roze-wechat
  labels:
    app.kubernetes.io/name: wechat-api
    app.kubernetes.io/part-of: roze-wechat
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wechat-api
  ports:
    - name: http
      port: 80
      targetPort: http
